version: 0.2

env:
  shell: bash

phases:
  build:
    on-failure: RETRY-1
    commands:
      - |
        echo "=========================================="
        echo "Provisioning Pipelines"
        echo "Build #${CODEBUILD_BUILD_NUMBER:-?} | ${CODEBUILD_BUILD_ID:-unknown}"
        echo "=========================================="

        chmod +x ./scripts/provision-pipelines.sh
        ./scripts/provision-pipelines.sh

  post_build:
    commands:
      - echo "Pipeline provisioning complete."
      - echo "Check AWS Console CodePipeline to see created pipelines."
