# aws-nuke configuration for ROSA Regional Platform CI accounts.
#
# Reference: https://github.com/ekristen/aws-nuke (v3)

regions:
  - us-east-1
  - global  # IAM, S3, Route53, etc.

# Needed but not used.
blocklist:
  - prod

# CI accounts don't have IAM aliases; skip that safety check.
bypass-alias-check-accounts:
  - "018092638725"
  - "791666871613"
  - "855246887846"
  - "599476212575"
  - "662212752128"
  - "811685182089"
  - "696000197236"
  - "720644165472"

presets:
  globals:
    filters:
      # Exclude all app-sre-infra resources
      __global__:
        - property: tag:app
          value: "app-sre-infra"
      S3Object:
        - property: BucketName
          type: regex
          value: "terraform-.*"
        - property: Bucket
          type: regex
          value: "terraform-.*"
      IAMUser:
        - terraform
      IAMUserAccessKey: &terraform-user-filters
        - property: UserName
          value: "terraform"
      IAMUserPolicyAttachment: *terraform-user-filters

      # Exclude default VPC things
      EC2VPC:
        - property: IsDefault
          value: "true"
      EC2Subnet: &default-vpc-filter
        - property: DefaultVPC
          value: "true"
      EC2InternetGateway: *default-vpc-filter
      EC2RouteTable: *default-vpc-filter
      EC2DHCPOption: *default-vpc-filter
      EC2SecurityGroup: *default-vpc-filter
      EC2DefaultSecurityGroupRule: *default-vpc-filter
      EC2InternetGatewayAttachment: *default-vpc-filter
      EC2NetworkACL: *default-vpc-filter

      # Exclude Cloudtrails
      CloudTrailTrail: &glob-all
        - type: glob
          value: "*"

      # Exclude OrgAdminAccessRole Things
      IAMRole:
        - "OrganizationAccountAccessRole"
      IAMRolePolicyAttachment:
        - property: RoleName
          value: "OrganizationAccountAccessRole"
      IAMRolePolicy:
        - property: RoleName
          value: "OrganizationAccountAccessRole"
      IAMSAMLProvider: &glob-name-all
        - property: Name
          type: glob
          value: "*"

  resource-explorer:
    filters:
      IAMRole:
        - property: Name
          type: contains
          value: "ResourceExplorerRole"
      IAMRolePolicyAttachment:
        - property: RoleName
          type: contains
          value: "ResourceExplorerRole"
      IAMRolePolicy:
        - property: RoleName
          type: contains
          value: "ResourceExplorerRole"

      ResourceExplorer2View: *glob-name-all
      ResourceExplorer2Index: *glob-name-all

accounts:
  # Sandbox 05
  "018092638725":
    presets:
      - globals
      - resource-explorer
    filters: &e2e-preserve-filters
      # ---------------------------------------------------------------
      # Preserve CI identity: IAM User "e2e"
      # ---------------------------------------------------------------
      IAMUser:
        - "e2e"
        - "ci"

      IAMUserAccessKey: &e2e-user-filters
        - property: UserName
          value: "e2e"
        - property: UserName
          value: "ci"
      IAMUserPolicyAttachment: *e2e-user-filters
      IAMUserPolicy: *glob-all
      IAMUserGroupAttachment: *e2e-user-filters

      IAMLoginProfile:
        - "e2e"

      IAMRole:
        - "ci"
        - property: Path
          type: glob
          value: "/aws-service-role/*"
        - property: Name
          type: regex
          value: "rosa-regional-.*"

      IAMRolePolicyAttachment:
        - property: RoleName
          type: glob
          value: "AWSServiceRoleFor*"
        - property: RoleName
          value: "ci"
        - property: RoleName
          type: regex
          value: "018092638725-.*"

      IAMRolePolicy:
        - property: RoleName
          type: glob
          value: "AWSServiceRoleFor*"
        - property: role:RoleName
          type: regex
          value: "rosa-regional-.*"

      # ---------------------------------------------------------------
      # Preserve ECR repositories for nightly-e2e IAM user
      # ---------------------------------------------------------------
      ECRRepository:
        - property: RepositoryName
          type: glob
          value: "e2e-platform-*"

      # Other resources to preserve
      Route53HostedZone: *glob-name-all

      CodeStarConnection:
        - "rosa-regional-github-shared"

      CodeBuildSourceCredential: *glob-name-all

  # Dev Control Account
  "791666871613":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

  # e2e-dev-regional-cluster
  "599476212575":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

  # e2e-dev-management-cluster-0
  "855246887846":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

  # CI Control
  "662212752128":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

  # CI Mgmt 0
  "811685182089":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

  # CI Mgmt 1
  "696000197236":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

  # CI RC
  "720644165472":
    presets:
      - globals
      - resource-explorer
    filters: *e2e-preserve-filters

settings:
  # Disable deletion protection on resources that may have it enabled
  # from failed terraform runs, so aws-nuke can delete them.
  RDSInstance:
    DisableDeletionProtection: true
  DynamoDBTable:
    DisableDeletionProtection: true
