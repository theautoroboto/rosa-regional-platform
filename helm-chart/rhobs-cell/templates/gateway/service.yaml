{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ include "rhobs-cell.namespace" . }}
  labels:
    {{- include "rhobs-cell.gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.gateway.service.grpcPort }}
    - port: {{ .Values.gateway.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "rhobs-cell.gateway.selectorLabels" . | nindent 4 }}
{{- end }}
