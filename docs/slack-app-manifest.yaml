display_information:
  name: Regionality Pipeline Notifications
  description: Sends AWS CodePipeline failure notifications to Slack channels
  background_color: "#4A154B"
  long_description: |
    Pipeline Notifications monitors your AWS CodePipeline executions and sends
    real-time failure alerts to designated Slack channels. Get notified instantly
    when pipelines fail, are stopped, or encounter errors during deployment.

    Features:
    - Real-time pipeline failure notifications
    - Stage and action-level failure details
    - Direct links to AWS Console and CloudWatch logs
    - Customizable notification channels
    - No manual webhook management

features:
  bot_user:
    display_name: Regionality Pipeline Notifications
    always_online: true

oauth_config:
  scopes:
    bot:
      - incoming-webhook

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
