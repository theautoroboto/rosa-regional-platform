name: Sync upstream-main branch

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: upstream-main
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream-main with upstream/main
        run: |
          git remote add upstream https://github.com/openshift-online/rosa-regional-platform.git
          git fetch upstream main
          git reset --hard upstream/main
          git push origin upstream-main --force-with-lease