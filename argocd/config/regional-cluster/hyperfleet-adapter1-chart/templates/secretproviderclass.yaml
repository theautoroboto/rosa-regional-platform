apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProvider.name }}
  namespace: {{ .Values.hyperfleetAdapter1Chart.targetNamespace }}
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    region: {{ .Values.global.aws_region | required "aws_region must be set" }}
    objects: |
      - objectName: "{{ .Values.global.cluster_name }}-hyperfleet-mq-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "url"
            objectAlias: "url"
  secretObjects:
    - secretName: hyperfleet-adapter1-broker-credentials
      type: Opaque
      data:
        - objectName: url
          key: BROKER_RABBITMQ_URL
