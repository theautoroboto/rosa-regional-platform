grafana:
  image:
    registry: docker.io
    repository: grafana/grafana-oss
    tag: "11.4.0"
    pullPolicy: IfNotPresent

  # FedRAMP: non-root (UID/GID 472)
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 472
    seccompProfile:
      type: RuntimeDefault

  # Static password prevents ArgoCD out-of-sync diffs.
  # Login form is disabled; this value is not used for access.
  adminPassword: "admin"

  serviceAccount:
    create: true
    name: grafana

  "grafana.ini":
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"

    security:
      disable_gravatar: true

    database:
      type: sqlite3
      path: /var/lib/grafana/grafana.db
      wal: true

    auth:
      disable_login_form: true

    "auth.anonymous":
      enabled: true
      org_role: Admin

    "auth.basic":
      enabled: false

    users:
      allow_sign_up: false
      auto_assign_org_role: Admin

    analytics:
      reporting_enabled: false
      check_for_updates: false
      check_for_plugin_updates: false

    log:
      mode: console
      level: info

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Thanos
          type: prometheus
          url: http://thanos-query-frontend-thanos-query.thanos:9090
          isDefault: true
          access: proxy
          editable: false
          jsonData:
            timeInterval: "30s"
            httpMethod: POST

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  replicas: 1

  # Dashboards fetched from grafana.com at startup
  dashboards:
    default:
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Thanos
      kubernetes-cluster-monitoring:
        gnetId: 7249
        revision: 1
        datasource: Thanos
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Thanos

  # Sidecar watches ConfigMaps labeled grafana_dashboard="1" and places them
  # in subdirectories based on the k8s-sidecar-target-directory annotation.
  # foldersFromFilesStructure creates Grafana folders from the subdirectory names.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: grafana
      folderAnnotation: k8s-sidecar-target-directory
      provider:
        foldersFromFilesStructure: true
        allowUiUpdates: true
