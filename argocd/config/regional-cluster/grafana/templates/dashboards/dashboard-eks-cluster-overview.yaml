apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-eks-cluster-overview
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Kubernetes"
data:
  eks-cluster-overview.json: {{ .Files.Get "dashboards/kubernetes/eks-cluster-overview.json" | quote }}
