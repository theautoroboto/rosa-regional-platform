apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-thanos-query-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Thanos"
data:
  thanos-query-frontend.json: {{ .Files.Get "dashboards/thanos/thanos-query-frontend.json" | quote }}
