apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-thanos-connectivity
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Test"
data:
  thanos-connectivity.json: {{ .Files.Get "dashboards/test/thanos-connectivity.json" | quote }}
