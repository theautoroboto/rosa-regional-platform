apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infrastructure
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Infrastructure"
data:
  platform-services.json: {{ .Files.Get "dashboards/infrastructure/platform-services.json" | quote }}
