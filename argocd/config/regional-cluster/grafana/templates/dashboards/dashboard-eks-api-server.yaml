apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-eks-api-server
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Infrastructure"
data:
  eks-api-server.json: {{ .Files.Get "dashboards/infrastructure/eks-api-server.json" | quote }}
