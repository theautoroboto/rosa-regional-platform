apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Infrastructure"
data:
  api-gateway.json: {{ .Files.Get "dashboards/infrastructure/api-gateway.json" | quote }}
