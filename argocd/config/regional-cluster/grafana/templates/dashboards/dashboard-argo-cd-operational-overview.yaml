apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argo-cd-operational-overview
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "ArgoCD"
data:
  argo-cd-operational-overview.json: {{ .Files.Get "dashboards/argocd/argo-cd-operational-overview.json" | quote }}
