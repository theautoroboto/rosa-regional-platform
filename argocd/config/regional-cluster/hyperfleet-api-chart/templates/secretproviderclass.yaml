{{- if .Values.secretProviderClass.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProviderClass.name }}
  namespace: {{ index .Values "hyperfleet-api-chart" "targetNamespace" }}
spec:
  provider: aws
  parameters:
    # Must match terraform/modules/hyperfleet-infrastructure Pod Identity for hyperfleet-api-sa
    usePodIdentity: "true"
    region: {{ .Values.global.aws_region | required "aws_region must be set" }}
    objects: |
      # Database credentials
      - objectName: "{{ .Values.global.cluster_name }}-hyperfleet-db-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "db.user"
          - path: "password"
            objectAlias: "db.password"
          - path: "host"
            objectAlias: "db.host"
          - path: "port"
            objectAlias: "db.port"
          - path: "database"
            objectAlias: "db.name"
  secretObjects:
    - secretName: hyperfleet-api-db-credentials
      type: Opaque
      data:
        - objectName: db.user
          key: db.user
        - objectName: db.password
          key: db.password
        - objectName: db.host
          key: db.host
        - objectName: db.port
          key: db.port
        - objectName: db.name
          key: db.name
{{- end }}
