kube-prometheus-stack:
  nameOverride: "monitoring"
  namespaceOverride: "monitoring"

  crds:
    enabled: true

  # Since these are not interactive clusters, we can turn off grafana
  # and alertmanager. All of these metrics will be forwarded into RHOBS
  alertmanager:
    enabled: false
  grafana:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  kube-state-metrics:
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  prometheus-node-exporter:
    # Bottlerocket sets IPV6_V6ONLY=1 so [HOST_IP]:9100 only binds IPv6.
    # listenOnAllInterfaces replaces the HOST_IP arg with 0.0.0.0:9100.
    service:
      listenOnAllInterfaces: true

  prometheus:
    prometheusSpec:
      replicas: 2
      retention: "14d"
      retentionSize: "85GB"
      serviceMonitorSelectorNilUsesHelmValues: false
      # External labels are required for Thanos to differentiate metrics from
      # multiple clusters. These are injected by the ApplicationSet at sync time.
      externalLabels:
        cluster: '{{ .Values.global.cluster_name }}'
        cluster_type: '{{ .Values.global.cluster_type }}'
      # TEMPORARY: direct in-cluster remote write to Thanos Receive.
      # Replace with SigV4-signed remote write to the RHOBS API Gateway once
      # the sigv4-proxy approach used by management clusters is implemented for RC.
      remoteWrite:
        - url: http://thanos-receive-router-thanos-receive.thanos:19291/api/v1/receive
      serviceMonitorNamespaceSelector: {}
      serviceMonitorSelector: {}

      # This prevents us from scheduling prometheus pods within the same AZ,
      # so that we have at least one zone with a replica
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus

      resources:
        requests:
          memory: 1Gi
          cpu: 250m
        limits:
          memory: 4Gi
          cpu: 2000m

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: prometheus-data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
