# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_type: ""
  environment: ""
  aws_region: ""
  cluster_name: ""
  aws_account_id: ""

namespace: thanos

objectStore:
  secretName: thanos-objstore-config

receive:
  enabled: true
  # For production, use replicas: 3, replicationFactor: 2
  replicas: 1
  replicationFactor: 1
  retention: 2h

  ingester:
    resources:
      requests:
        memory: 512Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m

  router:
    replicas: 1
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m

  storage:
    size: 50Gi
    storageClass: gp3

query:
  enabled: true
  replicas: 2

  frontend:
    replicas: 1

storeGateway:
  enabled: true
  replicas: 2

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  storage:
    size: 20Gi
    storageClass: gp3

compactor:
  enabled: true

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  retentionResolutionRaw: 90d
  retentionResolution5m: 180d
  retentionResolution1h: 365d

  storage:
    size: 50Gi
    storageClass: gp3

ruler:
  enabled: false

serviceAccount:
  name: thanos-operator
  annotations: {}

thanos:
  kmsKeyArn: ""

targetGroupBinding:
  enabled: true
  targetGroupARN: ""
  serviceName: thanos-receive-router
  port: 19291
  targetType: ip
