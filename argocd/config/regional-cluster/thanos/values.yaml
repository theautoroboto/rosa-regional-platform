# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_type: ""
  environment: ""
  aws_region: ""
  cluster_name: ""
  aws_account_id: ""

namespace: thanos

objectStore:
  secretName: thanos-objstore-config

receive:
  enabled: true
  # For production, use replicas: 3, replicationFactor: 2
  replicas: 1
  replicationFactor: 1
  retention: 2h

  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      memory: 2Gi

  router:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

  storage:
    size: 50Gi
    storageClass: gp3

query:
  enabled: true
  replicas: 2

  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      memory: 2Gi

  frontend:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

storeGateway:
  enabled: true
  replicas: 2

  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      memory: 4Gi

  storage:
    size: 20Gi
    storageClass: gp3

compactor:
  enabled: true

  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      memory: 4Gi

  retentionResolutionRaw: 90d
  retentionResolution5m: 180d
  retentionResolution1h: 365d

  storage:
    size: 50Gi
    storageClass: gp3

ruler:
  enabled: false

serviceAccount:
  name: thanos-operator
  annotations: {}

thanos:
  kmsKeyArn: ""
  targetGroup:
    arn: ""
    serviceName: thanos-receive-router-thanos-receive
    port: 19291
    targetType: ip
