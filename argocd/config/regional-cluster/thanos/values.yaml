# Thanos Operator Helm Chart Values
# Deploys the thanos-community operator and Thanos components via CRDs
# Source: https://github.com/thanos-community/thanos-operator

# Operator configuration
operator:
  image:
    repository: quay.io/redhat-user-workloads/rhobs-mco-tenant/rhobs-thanos-operator-main/rhobs-thanos-operator-main
    # UBI9-based image built and scanned by Red Hat RHOBS team via Konflux (Clair, ClamAV, Snyk, Coverity)
    # Source: https://github.com/rhobs/rhobs-konflux-thanos-operator
    # Digest: sha256:c4512873aecd1c8ca8c83d6ddad8fa9e55d4c0924cf9453d97280845d7934830
    tag: f83fea08f2a9167647cd8a9fd72f682c638c3cbb
    pullPolicy: IfNotPresent

  logLevel: info

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Namespace for Thanos components
namespace: thanos

# Object Store configuration (S3)
objectStore:
  # Secret name containing objstore.yml
  secretName: thanos-objstore-config

# Thanos Receive configuration
receive:
  enabled: true
  # For production, use replicas: 3, replicationFactor: 2
  replicas: 1
  replicationFactor: 1
  retention: 2h

  # Router distributes incoming requests across ingesters
  router:
    replicas: 1

  storage:
    size: 50Gi
    storageClass: gp3

# Thanos Query configuration
query:
  enabled: true
  replicas: 2

  frontend:
    replicas: 1

# Thanos Store Gateway configuration
storeGateway:
  enabled: true
  replicas: 2

  storage:
    size: 20Gi
    storageClass: gp3

# Thanos Compactor configuration
compactor:
  enabled: true

  retentionResolutionRaw: 90d
  retentionResolution5m: 180d
  retentionResolution1h: 365d

  storage:
    size: 50Gi
    storageClass: gp3

# Thanos Ruler configuration (disabled by default)
ruler:
  enabled: false

# Service Account configuration (for Thanos components, not operator)
serviceAccount:
  name: thanos-operator
  annotations: {}

# Thanos-specific values injected by ApplicationSet
# Bucket name derived from global.cluster_name: {cluster_name}-thanos-metrics
# Role ARN derived from global.aws_account_id + global.cluster_name: arn:aws:iam::{account}:role/{cluster_name}-thanos
# S3 endpoint derived from global.aws_region: s3.{region}.amazonaws.com
thanos:
  kmsKeyArn: ""

# TargetGroupBinding for ALB integration (expose Receiver)
targetGroupBinding:
  enabled: true
  targetGroupARN: ""
  # Service created by thanos-community operator
  serviceName: thanos-receive-router
  port: 19291
  targetType: ip
