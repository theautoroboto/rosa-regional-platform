{{- if .Values.query.enabled }}
apiVersion: monitoring.thanos.io/v1alpha1
kind: ThanosQuery
metadata:
  name: thanos-query
  namespace: {{ include "thanos-operator.namespace" . }}
  labels:
    {{- include "thanos-operator.labels" . | nindent 4 }}
  annotations:
    {{- include "thanos-operator.annotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.query.replicas | default 2 }}
  resourceRequirements:
    requests:
      cpu: {{ .Values.query.resources.requests.cpu }}
      memory: {{ .Values.query.resources.requests.memory }}
    limits:
      memory: {{ .Values.query.resources.limits.memory }}
  # Query will auto-discover stores via operator labels
  queryFrontend:
    replicas: {{ .Values.query.frontend.replicas | default 1 }}
    # Disable response compression — it buffers the entire response in memory
    # before sending, which drives OOMKills under query load.
    # Intra-cluster Grafana→Thanos traffic does not benefit from compression.
    compressResponses: false
    queryRangeMaxRetries: 0
    labelsMaxRetries: 0
    resourceRequirements:
      requests:
        cpu: {{ .Values.query.frontend.resources.requests.cpu }}
        memory: {{ .Values.query.frontend.resources.requests.memory }}
      limits:
        memory: {{ .Values.query.frontend.resources.limits.memory }}
    additionalArgs:
      - "--tracing.config="
      # Split queries into fixed-boundary intervals so results are cacheable.
      # Without splitting every query has a unique time range ending at "now"
      # which is always a cache miss, making the response cache ineffective.
      - "--query-range.split-interval=1h"
      - "--labels.split-interval=1h"
      # Cap concurrent downstream requests to bound the number of live context
      # objects in memory. Root cause of OOMKills: context.WithTimeout objects
      # accumulate when downstream queries are slow and retries multiply them.
      - "--query-frontend.max-concurrent=20"
      # Hard timeout per downstream sub-query so contexts are freed promptly
      # even if the downstream Thanos query is slow.
      - "--query-frontend.downstream-url-query-timeout=120s"
      {{- if .Values.thanos.cacheRedisEndpoint }}
      - '--query-range.response-cache-config={type: REDIS, config: {addr: "{{ .Values.thanos.cacheRedisEndpoint }}", tls_enabled: true, tls_config: {insecure_skip_verify: true}}}'
      {{- else }}
      - '--query-range.response-cache-config={type: IN-MEMORY, config: {max_size: "1GB"}}'
      {{- end }}
{{- end }}
