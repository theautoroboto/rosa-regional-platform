name: list_vpc_endpoints
scope: aws-api
type: read
description: List all VPC endpoints in the target account region (compact summary)
authorization:
  approval: none
timeout_seconds: 300
script: |
  set -euo pipefail
  aws ec2 describe-vpc-endpoints --output json > /tmp/raw.json
  jq '[.VpcEndpoints[] | {
    id: .VpcEndpointId,
    name: ((.Tags // []) | map(select(.Key == "Name")) | first | .Value // "-"),
    type: .VpcEndpointType,
    service: .ServiceName,
    state: .State,
    vpc_id: .VpcId,
    private_dns: .PrivateDnsEnabled,
    subnets: (.SubnetIds | length),
    created: .CreationTimestamp,
    tags: ((.Tags // []) | from_entries)
  }]' /tmp/raw.json > /artifacts/output.json
  echo "VPC endpoints listed successfully"
