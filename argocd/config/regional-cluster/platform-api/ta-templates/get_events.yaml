name: get_events
scope: kube-api
type: read
description: List or get recent events sorted by time, with optional filtering by involved object
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: namespace
    required: false
    default: ""
    description: "Target namespace"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List across all namespaces (overrides namespace)"
  - name: name
    required: false
    default: ""
    description: "Specific event name (omit to list all)"
  - name: field_selector
    required: false
    default: ""
    description: "Field selector (e.g. involvedObject.name=my-pod, type=Warning)"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAMESPACE_ARGS=()
  if [ "${PARAM_ALL_NAMESPACES:-false}" = "true" ]; then
    if [ -n "${PARAM_NAME:-}" ]; then
      echo "ERROR: Cannot use all_namespaces with a specific resource name"
      exit 1
    fi
    if [ -n "${PARAM_NAMESPACE:-}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${PARAM_NAMESPACE}"
    fi
    NAMESPACE_ARGS=(--all-namespaces)
  elif [ -n "${PARAM_NAMESPACE:-}" ]; then
    NAMESPACE_ARGS=(-n "${PARAM_NAMESPACE}")
  else
    echo "ERROR: Specify namespace or set all_namespaces=true"
    exit 1
  fi

  NAME_ARGS=()
  if [ -n "${PARAM_NAME:-}" ]; then
    NAME_ARGS=("${PARAM_NAME}")
  fi

  FIELD_ARGS=()
  if [ -n "${PARAM_FIELD_SELECTOR:-}" ]; then
    FIELD_ARGS=(--field-selector "${PARAM_FIELD_SELECTOR}")
  fi

  kubectl get events ${NAME_ARGS[@]+"${NAME_ARGS[@]}"} "${NAMESPACE_ARGS[@]}" ${FIELD_ARGS[@]+"${FIELD_ARGS[@]}"} --sort-by='.lastTimestamp' -o json > /tmp/raw.json

  if jq -e '.kind | endswith("List")' /tmp/raw.json > /dev/null 2>&1; then
    cp /tmp/raw.json /tmp/list.json
  else
    jq '{items: [.]}' /tmp/raw.json > /tmp/list.json
  fi

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/list.json /artifacts/output.json
  else
    jq '[.items[-50:] | .[] | {
      last_seen: ((now - (.lastTimestamp // .metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      type: .type,
      reason: .reason,
      object: (.involvedObject.kind + "/" + .involvedObject.name),
      namespace: .metadata.namespace,
      message: (.message | if length > 120 then .[:120] + "..." else . end),
      count: (.count // 1),
      source: ((.source.component // "") + (if .source.host then "/" + .source.host else "" end))
    }]' /tmp/list.json > /artifacts/output.json
  fi
  echo "Events retrieved successfully"
