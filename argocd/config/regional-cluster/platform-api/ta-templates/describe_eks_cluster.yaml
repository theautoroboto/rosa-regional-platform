name: describe_eks_cluster
scope: aws-api
type: read
description: Describe an EKS cluster by name in the target account region
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: name
    required: true
    description: "EKS cluster name"
script: |
  set -euo pipefail
  aws eks describe-cluster --name "${PARAM_NAME}" --output json > /artifacts/output.json
  echo "EKS cluster described successfully"
