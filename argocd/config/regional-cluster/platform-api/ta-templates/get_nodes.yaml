name: get_nodes
scope: kube-api
type: read
description: List or get nodes in the target cluster with status and resource information
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: name
    required: false
    default: ""
    description: "Specific node name (omit to list all)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter nodes (e.g. node-role.kubernetes.io/worker=)"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["nodes"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAME_ARGS=()
  if [ -n "${PARAM_NAME:-}" ]; then
    NAME_ARGS=("${PARAM_NAME}")
  fi

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  kubectl get nodes ${NAME_ARGS[@]+"${NAME_ARGS[@]}"} ${SELECTOR_ARGS[@]+"${SELECTOR_ARGS[@]}"} -o json > /tmp/raw.json

  if jq -e '.kind | endswith("List")' /tmp/raw.json > /dev/null 2>&1; then
    cp /tmp/raw.json /tmp/list.json
  else
    jq '{items: [.]}' /tmp/raw.json > /tmp/list.json
  fi

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/list.json /artifacts/output.json
  else
    jq '[.items[] | {
      name: .metadata.name,
      status: (if (.status.conditions[] | select(.type=="Ready") | .status) == "True" then "Ready" else "NotReady" end),
      roles: (.metadata.labels | with_entries(select(.key | startswith("node-role.kubernetes.io/"))) | keys | map(ltrimstr("node-role.kubernetes.io/")) | if length == 0 then "<none>" else join(",") end),
      age: ((now - (.metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      version: .status.nodeInfo.kubeletVersion,
      internal_ip: (.status.addresses[] | select(.type=="InternalIP") | .address),
      os_image: .status.nodeInfo.osImage,
      instance_type: .metadata.labels["node.kubernetes.io/instance-type"],
      zone: .metadata.labels["topology.kubernetes.io/zone"]
    }]' /tmp/list.json > /artifacts/output.json
  fi
  echo "Nodes retrieved successfully"
