name: describe_vpc_endpoint
scope: aws-api
type: read
description: Describe a VPC endpoint by ID (full detail)
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: name
    required: true
    description: "VPC endpoint ID (e.g. vpce-0cd30dac65a52b403)"
script: |
  set -euo pipefail
  aws ec2 describe-vpc-endpoints --vpc-endpoint-ids "${PARAM_NAME}" --output json > /artifacts/output.json
  echo "VPC endpoint described successfully"
