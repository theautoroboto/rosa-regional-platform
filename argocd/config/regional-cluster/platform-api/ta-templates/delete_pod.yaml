name: delete_pod
scope: kube-api
type: write
description: Delete a specific pod and wait until it is fully terminated
authorization:
  approval: none
timeout_seconds: 300
write_cooldown_seconds: 60
dry_run_action: get_pods
params:
  - name: namespace
    required: true
    description: "Namespace of the pod to delete"
  - name: name
    required: true
    description: "Name of the pod to delete"
rbac:
  cluster_scoped: false
  namespace_param: namespace
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch", "delete"]
script: |
  set -euo pipefail

  echo "Deleting pod ${PARAM_NAME} in namespace ${PARAM_NAMESPACE}..."
  kubectl delete pod "${PARAM_NAME}" -n "${PARAM_NAMESPACE}" --wait=true

  echo "Waiting for pod to be fully removed..."
  kubectl wait --for=delete pod/"${PARAM_NAME}" -n "${PARAM_NAMESPACE}" --timeout=120s 2>/dev/null || true

  jq -n --arg ns "${PARAM_NAMESPACE}" --arg pod "${PARAM_NAME}" \
    '{affected_resources: [{kind: "Pod", namespace: $ns, name: $pod, action: "deleted"}], summary: "Pod deleted successfully"}' \
    > /artifacts/output.json
  echo "Pod ${PARAM_NAME} deleted successfully"
