name: get_statefulsets
scope: kube-api
type: read
description: List or get statefulsets with replica status and storage class information
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: namespace
    required: false
    default: ""
    description: "Target namespace"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List across all namespaces (overrides namespace)"
  - name: name
    required: false
    default: ""
    description: "Specific statefulset name (omit to list all)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter (e.g. app=etcd)"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: ["apps"]
      resources: ["statefulsets"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAMESPACE_ARGS=()
  if [ "${PARAM_ALL_NAMESPACES:-false}" = "true" ]; then
    if [ -n "${PARAM_NAME:-}" ]; then
      echo "ERROR: Cannot use all_namespaces with a specific resource name"
      exit 1
    fi
    if [ -n "${PARAM_NAMESPACE:-}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${PARAM_NAMESPACE}"
    fi
    NAMESPACE_ARGS=(--all-namespaces)
  elif [ -n "${PARAM_NAMESPACE:-}" ]; then
    NAMESPACE_ARGS=(-n "${PARAM_NAMESPACE}")
  else
    echo "ERROR: Specify namespace or set all_namespaces=true"
    exit 1
  fi

  NAME_ARGS=()
  if [ -n "${PARAM_NAME:-}" ]; then
    NAME_ARGS=("${PARAM_NAME}")
  fi

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  kubectl get statefulsets ${NAME_ARGS[@]+"${NAME_ARGS[@]}"} "${NAMESPACE_ARGS[@]}" ${SELECTOR_ARGS[@]+"${SELECTOR_ARGS[@]}"} -o json > /tmp/raw.json

  if jq -e '.kind | endswith("List")' /tmp/raw.json > /dev/null 2>&1; then
    cp /tmp/raw.json /tmp/list.json
  else
    jq '{items: [.]}' /tmp/raw.json > /tmp/list.json
  fi

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/list.json /artifacts/output.json
  else
    jq '[.items[] | {
      name: .metadata.name,
      namespace: .metadata.namespace,
      ready: ((.status.readyReplicas // 0 | tostring) + "/" + (.spec.replicas | tostring)),
      age: ((now - (.metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      update_strategy: .spec.updateStrategy.type,
      service_name: .spec.serviceName,
      storage_class: (if .spec.volumeClaimTemplates then [.spec.volumeClaimTemplates[].spec.storageClassName] | unique | join(",") else "none" end),
      storage_size: (if .spec.volumeClaimTemplates then [.spec.volumeClaimTemplates[].spec.resources.requests.storage] | join(",") else "none" end)
    }]' /tmp/list.json > /artifacts/output.json
  fi
  echo "StatefulSets retrieved successfully"
