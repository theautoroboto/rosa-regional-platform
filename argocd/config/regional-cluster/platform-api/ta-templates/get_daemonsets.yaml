name: get_daemonsets
scope: kube-api
type: read
description: List or get daemonsets with scheduling status and node selector
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: namespace
    required: false
    default: ""
    description: "Target namespace"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List across all namespaces (overrides namespace)"
  - name: name
    required: false
    default: ""
    description: "Specific daemonset name (omit to list all)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: ["apps"]
      resources: ["daemonsets"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAMESPACE_ARGS=()
  if [ "${PARAM_ALL_NAMESPACES:-false}" = "true" ]; then
    if [ -n "${PARAM_NAME:-}" ]; then
      echo "ERROR: Cannot use all_namespaces with a specific resource name"
      exit 1
    fi
    if [ -n "${PARAM_NAMESPACE:-}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${PARAM_NAMESPACE}"
    fi
    NAMESPACE_ARGS=(--all-namespaces)
  elif [ -n "${PARAM_NAMESPACE:-}" ]; then
    NAMESPACE_ARGS=(-n "${PARAM_NAMESPACE}")
  else
    echo "ERROR: Specify namespace or set all_namespaces=true"
    exit 1
  fi

  NAME_ARGS=()
  if [ -n "${PARAM_NAME:-}" ]; then
    NAME_ARGS=("${PARAM_NAME}")
  fi

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  kubectl get daemonsets ${NAME_ARGS[@]+"${NAME_ARGS[@]}"} "${NAMESPACE_ARGS[@]}" ${SELECTOR_ARGS[@]+"${SELECTOR_ARGS[@]}"} -o json > /tmp/raw.json

  if jq -e '.kind | endswith("List")' /tmp/raw.json > /dev/null 2>&1; then
    cp /tmp/raw.json /tmp/list.json
  else
    jq '{items: [.]}' /tmp/raw.json > /tmp/list.json
  fi

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/list.json /artifacts/output.json
  else
    jq '[.items[] | {
      name: .metadata.name,
      namespace: .metadata.namespace,
      desired: .status.desiredNumberScheduled,
      current: .status.currentNumberScheduled,
      ready: .status.numberReady,
      up_to_date: (.status.updatedNumberScheduled // 0),
      available: (.status.numberAvailable // 0),
      misscheduled: (.status.numberMisscheduled // 0),
      age: ((now - (.metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      node_selector: (if .spec.template.spec.nodeSelector then (.spec.template.spec.nodeSelector | to_entries | map(.key + "=" + .value) | join(",")) else "<none>" end),
      containers: [.spec.template.spec.containers[] | .name] | join(",")
    }]' /tmp/list.json > /artifacts/output.json
  fi
  echo "DaemonSets retrieved successfully"
