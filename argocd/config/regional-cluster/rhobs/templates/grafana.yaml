{{- if .Values.rhobs.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.rhobs.namespace }}
  labels:
    {{- include "rhobs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    {{- if .Values.rhobs.grafana.datasources.thanos.enabled }}
    - name: Thanos
      type: prometheus
      access: proxy
      url: {{ .Values.rhobs.grafana.datasources.thanos.url }}
      isDefault: true
      editable: true
    {{- end }}
    {{- if .Values.rhobs.grafana.datasources.loki.enabled }}
    - name: Loki
      type: loki
      access: proxy
      url: {{ .Values.rhobs.grafana.datasources.loki.url }}
      editable: true
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.rhobs.namespace }}
  labels:
    {{- include "rhobs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.rhobs.grafana.service.type }}
  ports:
    - name: http
      port: {{ .Values.rhobs.grafana.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/component: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.rhobs.namespace }}
  labels:
    {{- include "rhobs.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: {{ .Values.rhobs.grafana.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/component: grafana
        {{- include "rhobs.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: grafana
      containers:
        - name: grafana
          image: "{{ .Values.rhobs.grafana.image.registry }}/{{ .Values.rhobs.grafana.image.repository }}:{{ .Values.rhobs.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.rhobs.grafana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.rhobs.grafana.admin.user | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rhobs.grafana.admin.existingSecret }}
                  key: {{ .Values.rhobs.grafana.admin.existingSecretKey }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.rhobs.grafana.requests.cpu }}
              memory: {{ .Values.rhobs.grafana.requests.memory }}
            limits:
              cpu: {{ .Values.rhobs.grafana.limits.cpu }}
              memory: {{ .Values.rhobs.grafana.limits.memory }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
{{- end }}
