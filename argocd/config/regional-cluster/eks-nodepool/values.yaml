global:
  cluster_name: <cluster-name>
  region: us-east-1
  apiserver_endpoint: https://6739D307E3404938CA4B8CD7C5E79E61.gr7.us-east-1.eks.amazonaws.com
  cluster_ca: ""
  service_cidr: "172.20.0.0/16"

eksNodeClass:
  amiIds:
    - ami-0dbbd77d98c659bb4 # RHEL 9 FIPS K8s 1.34 us-east-1 (built 2026-06-15)
    # Add 1.35 and 1.36 AMI IDs here once built

eksNodePool:
  instanceFamilies:
    - m8i
    - m7i
  capacityType: on-demand
  arch: amd64
  limits:
    cpu: "64"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s
