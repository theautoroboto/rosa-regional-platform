{{- if and .Values.rhobsAgent.mtls.enabled .Values.rhobsAgent.certManager.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rhobsAgent.mtls.certificateName }}
  namespace: {{ .Values.rhobsAgent.namespace }}
  labels:
    {{- include "rhobs-agent.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.rhobsAgent.mtls.certificateName }}
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  subject:
    organizations:
      - rosa-regional-platform
  commonName: {{ .Values.global.cluster_name | quote }}
  dnsNames:
    - "{{ .Values.global.cluster_name }}.{{ .Values.global.environment }}.{{ .Values.global.aws_region }}"
  issuerRef:
    name: {{ .Values.rhobsAgent.mtls.certificateIssuer }}
    kind: {{ .Values.rhobsAgent.mtls.certificateIssuerKind }}
    group: cert-manager.io
{{- end }}
