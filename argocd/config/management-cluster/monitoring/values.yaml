kube-prometheus-stack:
  nameOverride: "monitoring"
  namespaceOverride: "monitoring"

  crds:
    enabled: true

  # Since these are not interactive clusters, we can turn off grafana
  # and alertmanager. All of these metrics will be forwarded into RHOBS
  alertmanager:
    enabled: false
  grafana:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

  kube-state-metrics:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 512Mi

  prometheus:
    prometheusSpec:
      replicas: 2
      retention: "14d"
      retentionSize: "85GB"
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 800m
          memory: 2Gi
        limits:
          memory: 8Gi

      serviceMonitorNamespaceSelector: {}
      serviceMonitorSelector: {}

      # -------------------------------------------------------------------
      # Remote Write via sigv4-proxy service
      #
      # The prometheus-operator CRD does not expose sigv4.serviceName,
      # which defaults to "aps" (Amazon Managed Prometheus). For API
      # Gateway we need "execute-api". Workaround: point remote_write at
      # the sigv4-proxy service which handles signing correctly.
      #
      # No THANOS-TENANT header needed — API GW injects it server-side
      # from context.identity.accountId.
      # -------------------------------------------------------------------
      remoteWrite:
        - url: "http://sigv4-proxy.monitoring.svc:8005/prod/api/v1/receive"

      # This prevents us from scheduling prometheus pods within the same AZ,
      # so that we have at least one zone with a replica
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: prometheus-data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
