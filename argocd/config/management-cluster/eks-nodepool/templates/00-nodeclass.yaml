apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: fips
spec:
  role: "{{ .Values.global.cluster_name }}-auto-node-role"
  subnetSelectorTerms:
    - tags:
        "kubernetes.io/cluster/{{ .Values.global.cluster_name }}": owned
  securityGroupSelectorTerms:
    - tags:
        aws:eks:cluster-name: "{{ .Values.global.cluster_name }}"
  amiFamily: Custom
  amiSelectorTerms:
    - tags:
        {{- range $k, $v := .Values.eksNodeClass.amiSelector.tags }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        rosa-regional-platform/k8s-version: {{ .Values.global.k8s_version | quote }}
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 2
  userData: |
    {
      "apiVersion": "node.eks.aws/v1alpha1",
      "kind": "NodeConfig",
      "spec": {
        "cluster": {
          "name": "{{ .Values.global.cluster_name }}",
          "apiServerEndpoint": "{{ .Values.global.apiserver_endpoint }}",
          "certificateAuthority": "{{ .Values.global.cluster_ca }}",
          "cidr": "{{ .Values.global.service_cidr }}"
        },
        "featureGates": {
          "InstanceIdNodeName": true
        }
      }
    }
