global:
  cluster_name: <cluster-name>
  region: us-east-1
  # Injected by ApplicationSet from the cluster secret .server field
  apiserver_endpoint: https://placeholder.example.com
  # Base64-encoded cluster CA cert; injected by ApplicationSet from cluster secret annotation
  cluster_ca: ""
  # EKS service CIDR; nodeadm derives the CoreDNS address from this
  service_cidr: "172.20.0.0/16"

eksNodeClass:
  amiIds:
    - ami-0e803ac7d45653fe8 # RHEL 9 FIPS K8s 1.34 us-east-1 (built 2026-06-15)
    # Add 1.35 and 1.36 AMI IDs here once built

eksNodePool:
  instanceFamilies:
    - m8i
    - m7i
  capacityType: on-demand
  arch: amd64
  limits:
    cpu: "64"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s
