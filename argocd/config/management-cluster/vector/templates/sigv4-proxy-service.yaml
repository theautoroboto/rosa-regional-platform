apiVersion: v1
kind: Service
metadata:
  name: sigv4-proxy-logs
  namespace: vector
  labels:
    app.kubernetes.io/name: sigv4-proxy-logs
    app.kubernetes.io/component: logs-proxy
    app.kubernetes.io/part-of: observability
spec:
  selector:
    app.kubernetes.io/name: sigv4-proxy-logs
  ports:
    - name: proxy
      port: {{ .Values.sigv4ProxyLogs.port }}
      targetPort: {{ .Values.sigv4ProxyLogs.port }}
      protocol: TCP
