# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_type: ""
  environment: ""
  aws_region: ""
  cluster_name: ""
  rhobs_api_url: ""

# =====================================================================
# sigv4-proxy-logs: signs Loki push requests with SigV4 for the RC API Gateway.
# Same architecture as Thanos remote-write sigv4 proxy on MC.
# =====================================================================
sigv4ProxyLogs:
  image:
    repository: public.ecr.aws/aws-observability/aws-sigv4-proxy
    tag: "1.11"
    pullPolicy: IfNotPresent
  port: 8006
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =====================================================================
# Upstream vector/vector subchart values
# Ref: https://github.com/vectordotdev/helm-charts/blob/develop/charts/vector/values.yaml
#
# Vector pipeline config mirrors RHOBS ClusterLogForwarder patterns:
#   - JSON parsing (CLF parse-json filter)
#   - Webhook log exclusion (CLF input exclusion)
#   - Disk-buffered delivery with retry (CLF output tuning)
#   - Logs sent to sigv4-proxy-logs → RC API Gateway → Loki Distributor
# =====================================================================
vector:
  role: Agent

  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: [ALL]
      add: [DAC_READ_SEARCH]

  tolerations:
    - operator: Exists

  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 750m
      memory: 2Gi

  persistence:
    hostPath:
      enabled: true
      path: /var/lib/vector

  livenessProbe:
    httpGet:
      path: /health
      port: 8686
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: 8686
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2

  containerPorts:
    - name: api
      containerPort: 8686
      protocol: TCP
    - name: prom-exporter
      containerPort: 9090
      protocol: TCP

  podMonitor:
    enabled: true
    port: prom-exporter
    path: /metrics
    interval: "30s"

  rbac:
    create: true

  serviceAccount:
    create: true
    name: vector

  # ── Vector pipeline configuration ──────────────────────────────────────
  # MC logs route through sigv4-proxy-logs to reach RC Loki via API Gateway.
  # NOTE: customConfig is processed via Helm tpl within the subchart scope.
  # Only .Values.global.* is accessible (Helm propagates globals to subcharts).
  # sigv4ProxyLogs port is hardcoded here since parent values aren't available.
  customConfig:
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: "0.0.0.0:8686"

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${VECTOR_SELF_NODE_NAME}"
        exclude_paths_glob_patterns:
          - "/var/log/pods/*/webhook*/**"
          - "/var/log/pods/*/webhooks/**"

      internal_metrics:
        type: internal_metrics

    transforms:
      parse_json:
        type: remap
        inputs: [kubernetes_logs]
        source: |
          parsed, err = parse_json(.message)
          if err == null && is_object(parsed) {
            . = merge!(., parsed)
          }

      add_cluster_metadata:
        type: remap
        inputs: [parse_json]
        source: |
          .cluster_name = "{{ .Values.global.cluster_name | default "unknown" }}"
          .cluster_type = "management-cluster"

    sinks:
      loki:
        type: loki
        inputs: [add_cluster_metadata]
        endpoint: "http://sigv4-proxy-logs.vector.svc:8006"
        path: "/prod/loki/api/v1/push"
        encoding:
          codec: json
        labels:
          cluster_name: '{{ "{{ cluster_name }}" }}'
          cluster_type: '{{ "{{ cluster_type }}" }}'
          namespace: '{{ "{{ kubernetes.pod_namespace }}" }}'
          pod: '{{ "{{ kubernetes.pod_name }}" }}'
          container: '{{ "{{ kubernetes.container_name }}" }}'
        out_of_order_action: accept
        remove_timestamp: false
        buffer:
          type: disk
          max_size: 268435488
          when_full: block
        batch:
          max_bytes: 2049000
          timeout_secs: 5
        request:
          retry_max_duration_secs: 300
          retry_initial_backoff_secs: 1

      prometheus_exporter:
        type: prometheus_exporter
        inputs: [internal_metrics]
        address: "0.0.0.0:9090"
