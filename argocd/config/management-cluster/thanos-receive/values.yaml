# Thanos Receive - Default Values
# These are overridden by environment-specific values in deploy/{env}/{region}/argocd/

global:
  cluster_type: management-cluster
  environment: ""
  aws_region: ""
  cluster_name: ""

# =============================================================================
# API Gateway / SigV4 Authentication
# =============================================================================
# When enabled, creates a TargetGroupBinding to register Thanos Receive pods
# with an AWS ALB target group. The ALB is fronted by API Gateway with
# AWS_IAM (SigV4) authentication.
#
# Required: Deploy the thanos-gateway Terraform module first to create
# the API Gateway, ALB, and target group.
# =============================================================================

targetGroupBinding:
  # Enable TargetGroupBinding for API Gateway integration
  enabled: false

  # Target Group ARN from Terraform: module.thanos_gateway.target_group_arn
  arn: ""

  # ALB Security Group ID from Terraform: module.thanos_gateway.alb_security_group_id
  albSecurityGroupId: ""

  # Service port (Thanos Receive remote-write port)
  servicePort: 19291

# Thanos subchart configuration
thanos:
  enabled: true

  # Disable components we don't need for basic receive test
  queryFrontend:
    enabled: false

  storegateway:
    enabled: false

  compactor:
    enabled: false

  ruler:
    enabled: false

  minio:
    enabled: false

  # S3 Object Storage Configuration
  # Uses IRSA (IAM Roles for Service Accounts) for authentication - no credentials needed
  # The service account annotation is set via existingObjstoreSecret or inline config
  #
  # To enable S3 storage, set objstoreConfig with your bucket details:
  # objstoreConfig: |
  #   type: S3
  #   config:
  #     bucket: <bucket-name>
  #     endpoint: s3.<region>.amazonaws.com
  #     region: <region>
  #     # IRSA handles authentication - no access_key/secret_key needed
  #
  # For testing without S3, leave empty (uses local storage only)
  objstoreConfig: ""

  # Thanos Receive - metrics ingestion endpoint
  receive:
    enabled: true
    replicaCount: 1

    # Log level
    logLevel: info

    # TSDB retention (local, before shipping to S3)
    tsdbRetention: 2h

    # Persistence
    persistence:
      enabled: true
      size: 50Gi
      storageClass: gp3

    # Resources
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Service configuration
    service:
      type: ClusterIP
      ports:
        http: 10902
        grpc: 10901
        remote-write: 19291

    # Extra flags
    extraFlags:
      - --tsdb.wal-compression
      - --receive.local-endpoint=127.0.0.1:10901

    # Pod anti-affinity
    podAntiAffinityPreset: soft

    # Service account with IRSA support
    # Set the annotation with your IAM role ARN to enable S3 access via IRSA:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role-name>
    serviceAccount:
      create: true
      annotations: {}
      # Example for IRSA:
      # annotations:
      #   eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/thanos-receive-s3-role"

  # Thanos Query - for verifying ingested metrics
  query:
    enabled: true
    replicaCount: 1

    # Discover receive as a store
    stores: []
    # Will be auto-discovered via DNS

    dnsDiscovery:
      enabled: true
      sidecarsService: ""
      sidecarsNamespace: ""

    # Resources
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Service
    service:
      type: ClusterIP
      ports:
        http: 9090
        grpc: 10901

  # Enable metrics for monitoring
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false  # Enable if Prometheus Operator is installed
