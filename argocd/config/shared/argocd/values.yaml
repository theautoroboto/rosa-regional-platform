# Direct ArgoCD configuration
# This section will be passed to the upstream ArgoCD chart
argo-cd:
  # High Availability configuration
  ha:
    enabled: true

  # Server configuration
  server:
    autoscaling:
      enabled: true
      minReplicas: 2
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 400m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Controller configuration
  controller:
    resources:
      limits:
        cpu: 4000m
        memory: 8Gi
      requests:
        cpu: 2000m
        memory: 4Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Repo Server configuration
  repoServer:
    autoscaling:
      enabled: true
      minReplicas: 2
    resources:
      requests:
        cpu: 400m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # ApplicationSet controller
  applicationSet:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Redis Secret Init configuration
  redisSecretInit:
    enabled: false # Ref: https://github.com/argoproj/argo-helm/issues/2887

  # Configuration parameters
  configs:
    params:
      server.insecure: false
