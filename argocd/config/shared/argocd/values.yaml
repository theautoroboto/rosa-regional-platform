# Direct ArgoCD configuration
# This section will be passed to the upstream ArgoCD chart
argo-cd:
  # High Availability configuration
  ha:
    enabled: true

  # CriticalAddonsOnly toleration for all ArgoCD components so they can
  # schedule on the karpenter-bootstrap node group before Karpenter has
  # provisioned any worker nodes. Harmless on regular nodes.
  global:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule

  # Server configuration
  server:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    autoscaling:
      enabled: true
      minReplicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: server
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: server
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Controller configuration
  controller:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: application-controller
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: application-controller
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Repo Server configuration
  repoServer:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    autoscaling:
      enabled: true
      minReplicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: repo-server
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: repo-server
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # ApplicationSet controller
  applicationSet:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Dex configuration
  dex:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Notifications controller
  notifications:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Redis HA configuration (enabled via ha.enabled=true above).
  # redis-ha is a subchart and does not inherit global.tolerations.
  redis-ha:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
    haproxy:
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule

  # redis key kept for non-HA mode reference (unused when ha.enabled=true)
  redis:
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Redis Secret Init configuration
  redisSecretInit:
    enabled: false # Ref: https://github.com/argoproj/argo-helm/issues/2887

  # Configuration parameters
  configs:
    params:
      server.insecure: false
