# =============================================================================
# Global defaults — inherited by all environments and regions.
#
# Inheritance chain:
#   defaults.yaml → <env>/defaults.yaml → <env>/<region>.yaml
#
# All string values support Jinja2 templating. The following variables are
# injected automatically by render.py:
#   {{ environment }}    — environment directory name (e.g. "integration")
#   {{ aws_region }}     — region file stem (e.g. "us-east-1")
#   {{ cluster_prefix }} — management_cluster key (e.g. "mc01")
#
# Documentation: @doc and @used-by annotations (validated by: render.py --check-docs)
# =============================================================================

git:
  # @doc git.revision ArgoCD ApplicationSet chart + generator revision. Commit hash to pin, "main" for HEAD.
  # @used-by git.revision _context
  revision: main
  # @doc git.bootstrap_revision Pipeline provisioner bootstrap revision.
  # @used-by git.bootstrap_revision _context
  bootstrap_revision: main

aws:
  # @doc aws.account_id Regional AWS account ID.
  # @used-by aws.account_id _context
  account_id: "ssm:///infra/{{ environment }}/{{ aws_region }}/account_id"
  # @doc aws.management_cluster_account_id Default account for MCs when entry has no account_id.
  # @used-by aws.management_cluster_account_id _context
  management_cluster_account_id: "ssm:///infra/{{ environment }}/{{ aws_region }}/{{ cluster_prefix }}/account_id"

dns:
  # @doc dns.domain Base domain for the environment. Must be set per environment.
  # @used-by dns.domain pipeline-provisioner-inputs/terraform.json.j2
  domain: ""

terraform_common:
  # @doc terraform_common.app_code Application code for cost tagging.
  # @used-by terraform_common.app_code pipeline-management-cluster-inputs/terraform.json.j2
  # @used-by terraform_common.app_code pipeline-regional-cluster-inputs/terraform.json.j2
  app_code: "infra"
  # @doc terraform_common.service_phase Service deployment phase.
  # @used-by terraform_common.service_phase pipeline-management-cluster-inputs/terraform.json.j2
  # @used-by terraform_common.service_phase pipeline-regional-cluster-inputs/terraform.json.j2
  service_phase: "dev"
  # @doc terraform_common.cost_center Cost center code for billing.
  # @used-by terraform_common.cost_center pipeline-management-cluster-inputs/terraform.json.j2
  # @used-by terraform_common.cost_center pipeline-regional-cluster-inputs/terraform.json.j2
  cost_center: "000"
  # @doc terraform_common.enable_bastion Enable bastion host for cluster access.
  # @used-by terraform_common.enable_bastion pipeline-management-cluster-inputs/terraform.json.j2
  # @used-by terraform_common.enable_bastion pipeline-regional-cluster-inputs/terraform.json.j2
  enable_bastion: false

applications:
  management-cluster:
    hypershift:
      oidcStorageS3Bucket:
        # @doc applications.management-cluster.hypershift.oidcStorageS3Bucket.name OIDC S3 bucket name for HyperShift.
        # @used-by applications.management-cluster.hypershift.oidcStorageS3Bucket.name _context
        name: "hypershift-mc-{{ aws_region }}"
        # @doc applications.management-cluster.hypershift.oidcStorageS3Bucket.region OIDC S3 bucket region.
        # @used-by applications.management-cluster.hypershift.oidcStorageS3Bucket.region _context
        region: "{{ aws_region }}"
      externalDns:
        # @doc applications.management-cluster.hypershift.externalDns.domain External DNS domain for HyperShift.
        # @used-by applications.management-cluster.hypershift.externalDns.domain _context
        domain: "dev.{{ aws_region }}.rosa.example.com"
  regional-cluster:
    maestro:
      # @doc applications.regional-cluster.maestro.mqttEndpoint Maestro MQTT broker endpoint.
      # @used-by applications.regional-cluster.maestro.mqttEndpoint _context
      mqttEndpoint: "xxx.iot.{{ aws_region }}.amazonaws.com"
    # @doc applications.regional-cluster.someOtherSetting Example setting for regional cluster.
    # @used-by applications.regional-cluster.someOtherSetting _context
    someOtherSetting: "value"

# management_clusters: MC topology, defined per-region. Keys are MC IDs.
# Fields below are injected into templates as mc.* by render.py.
#   mc01:
#     # @doc mc.account_id Per-MC AWS account ID. Defaults to aws.management_cluster_account_id.
#     # @used-by mc.account_id pipeline-management-cluster-inputs/terraform.json.j2
#     # @used-by mc.account_id pipeline-provisioner-inputs/management-cluster.json.j2
#     account_id: "123456789012"
#     # @doc mc.delete Triggers infrastructure destruction for this MC.
#     # @used-by mc.delete pipeline-management-cluster-inputs/terraform.json.j2
#     delete: true
#     # @doc mc.delete_pipeline Triggers pipeline removal for this MC.
#     # @used-by mc.delete_pipeline pipeline-provisioner-inputs/management-cluster.json.j2
#     delete_pipeline: true

# Computed fields — generated by render.py, not from config values.
#
# @doc mc.management_id MC identifier, computed from cluster key + CI prefix.
# @used-by mc.management_id pipeline-management-cluster-inputs/terraform.json.j2
# @used-by mc.management_id pipeline-provisioner-inputs/management-cluster.json.j2
