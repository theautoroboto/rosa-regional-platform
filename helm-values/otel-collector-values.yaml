# OpenTelemetry Collector Helm Values for Fleet Clusters
# Chart: open-telemetry/opentelemetry-collector
# Docs: https://github.com/open-telemetry/opentelemetry-helm-charts

# Deploy as Deployment for centralized collection
mode: deployment

replicaCount: 2

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
          topologyKey: kubernetes.io/hostname

# Service account
serviceAccount:
  create: true
  annotations: {}

# Ports
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# OpenTelemetry Collector configuration
config:
  receivers:
    # OTLP receiver for application telemetry
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Prometheus receiver to scrape local metrics
    prometheus:
      config:
        scrape_configs:
          # Federate from local Prometheus
          - job_name: 'federate'
            honor_labels: true
            metrics_path: '/federate'
            params:
              'match[]':
                - '{__name__=~"ALERTS|ALERTS_FOR_STATE"}'
                - '{__name__=~"cluster:.*"}'
                - '{__name__=~"namespace:.*"}'
                - '{__name__=~"node:.*"}'
                - '{__name__=~"container_.*",namespace!=""}'
                - '{__name__=~"kube_.*"}'
                - '{__name__=~"up"}'
            static_configs:
              - targets:
                  - 'prometheus-operated.monitoring.svc.cluster.local:9090'
            scrape_interval: 30s
            scrape_timeout: 25s

          # Scrape kubelet metrics
          - job_name: 'kubelet'
            scheme: https
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecure_skip_verify: true
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            kubernetes_sd_configs:
              - role: node
            relabel_configs:
              - action: labelmap
                regex: __meta_kubernetes_node_label_(.+)
              - target_label: __address__
                replacement: kubernetes.default.svc:443
              - source_labels: [__meta_kubernetes_node_name]
                target_label: __metrics_path__
                replacement: /api/v1/nodes/${1}/proxy/metrics

    # Kubernetes cluster metrics
    k8s_cluster:
      collection_interval: 30s
      node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
        - PIDPressure

  processors:
    # Batch processor for efficiency
    batch:
      timeout: 10s
      send_batch_size: 1024
      send_batch_max_size: 2048

    # Memory limiter to prevent OOM
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    # Add cluster metadata
    resource:
      attributes:
        - key: cluster_id
          value: "${CLUSTER_ID}"
          action: upsert
        - key: cluster_name
          value: "${CLUSTER_NAME}"
          action: upsert
        - key: region
          value: "${REGION}"
          action: upsert
        - key: environment
          value: "${ENVIRONMENT}"
          action: upsert

    # Kubernetes attributes
    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      filter:
        node_from_env_var: KUBE_NODE_NAME
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
        labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: app.kubernetes.io/name
            key: app.kubernetes.io/name
            from: pod
        annotations:
          - tag_name: owner
            key: owner
            from: namespace
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection

    # Filter out high-cardinality metrics
    filter/metrics:
      metrics:
        exclude:
          match_type: regexp
          metric_names:
            - ".*_bucket"  # Exclude raw histogram buckets, keep _sum and _count
          # Keep histogram buckets only for specific important metrics
        include:
          match_type: regexp
          metric_names:
            - ".*"

    # Transform metrics
    transform/metrics:
      metric_statements:
        - context: datapoint
          statements:
            # Drop labels that cause high cardinality
            - delete_key(attributes, "pod_ip")
            - delete_key(attributes, "instance")

  exporters:
    # OTLP exporter to RHOBS cell
    otlphttp/rhobs:
      endpoint: https://rhobs.${REGION}.internal/api/v1/otlp
      tls:
        cert_file: /certs/client.crt
        key_file: /certs/client.key
        ca_file: /certs/ca.crt
      headers:
        X-Scope-OrgID: eks
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s
      sending_queue:
        enabled: true
        num_consumers: 10
        queue_size: 5000

    # Prometheus remote write to Thanos
    prometheusremotewrite/rhobs:
      endpoint: https://rhobs.${REGION}.internal/api/v1/receive
      tls:
        cert_file: /certs/client.crt
        key_file: /certs/client.key
        ca_file: /certs/ca.crt
      headers:
        X-Scope-OrgID: eks
      external_labels:
        cluster_id: "${CLUSTER_ID}"
        cluster_name: "${CLUSTER_NAME}"
        region: "${REGION}"
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s
      resource_to_telemetry_conversion:
        enabled: true

    # Debug exporter for troubleshooting
    debug:
      verbosity: basic
      sampling_initial: 5
      sampling_thereafter: 200

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

    pprof:
      endpoint: 0.0.0.0:1777

    zpages:
      endpoint: 0.0.0.0:55679

  service:
    extensions:
      - health_check
      - pprof
      - zpages

    pipelines:
      metrics:
        receivers:
          - prometheus
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - filter/metrics
          - transform/metrics
          - batch
        exporters:
          - prometheusremotewrite/rhobs

      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - batch
        exporters:
          - otlphttp/rhobs

    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

# Volume mounts for mTLS certificates
extraVolumes:
  - name: certs
    secret:
      secretName: rhobs-client-cert

extraVolumeMounts:
  - name: certs
    mountPath: /certs
    readOnly: true

# Environment variables
extraEnvs:
  - name: KUBE_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: CLUSTER_ID
    valueFrom:
      configMapKeyRef:
        name: cluster-info
        key: cluster-id
  - name: CLUSTER_NAME
    valueFrom:
      configMapKeyRef:
        name: cluster-info
        key: cluster-name
  - name: REGION
    valueFrom:
      configMapKeyRef:
        name: cluster-info
        key: region
  - name: ENVIRONMENT
    valueFrom:
      configMapKeyRef:
        name: cluster-info
        key: environment

# Service monitor
serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: prometheus

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# RBAC for k8s_cluster receiver
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources:
        - events
        - namespaces
        - namespaces/status
        - nodes
        - nodes/spec
        - nodes/stats
        - nodes/proxy
        - pods
        - pods/status
        - replicationcontrollers
        - replicationcontrollers/status
        - resourcequotas
        - services
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources:
        - daemonsets
        - deployments
        - replicasets
        - statefulsets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources:
        - jobs
        - cronjobs
      verbs: ["get", "list", "watch"]
    - apiGroups: ["autoscaling"]
      resources:
        - horizontalpodautoscalers
      verbs: ["get", "list", "watch"]
