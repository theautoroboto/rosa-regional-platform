# External Secrets Operator Helm Values
# Chart: external-secrets/external-secrets
# Docs: https://external-secrets.io/

# Install CRDs
installCRDs: true

# Replicas
replicaCount: 2

# Resources
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

# Leader election
leaderElect: true

# Concurrent reconciles
concurrent: 5

# Service account
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/external-secrets-${REGION}

# Pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: external-secrets
          topologyKey: kubernetes.io/hostname

# Webhook configuration
webhook:
  replicaCount: 2

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  certManager:
    enabled: true
    cert:
      duration: 8760h  # 1 year
      renewBefore: 720h  # 30 days

# Cert controller
certController:
  replicaCount: 2

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Metrics
metrics:
  service:
    enabled: true
    port: 8080

# ServiceMonitor
serviceMonitor:
  enabled: true
  namespace: observability
  labels:
    release: kube-prometheus-stack
  interval: 30s

# Pod security
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

# Network policy
networkPolicy:
  enabled: true

# Pod labels
podLabels:
  app.kubernetes.io/part-of: rhobs

---
# ClusterSecretStore for AWS Secrets Manager
# Apply this separately after installing the operator
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ${REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# ExternalSecret example for RHOBS credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhobs-client-credentials
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rhobs-client-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        client-id: "{{ .clientId }}"
        client-secret: "{{ .clientSecret }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: rhobs/${ENVIRONMENT}/${REGION}/metrics-write
        property: client-id
    - secretKey: clientSecret
      remoteRef:
        key: rhobs/${ENVIRONMENT}/${REGION}/metrics-write
        property: client-secret

---
# ExternalSecret for Grafana OAuth credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oauth-credentials
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-oauth-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        OAUTH_CLIENT_ID: "{{ .clientId }}"
        OAUTH_CLIENT_SECRET: "{{ .clientSecret }}"
        OAUTH_DOMAIN: "{{ .domain }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: grafana/${ENVIRONMENT}/oauth
        property: client-id
    - secretKey: clientSecret
      remoteRef:
        key: grafana/${ENVIRONMENT}/oauth
        property: client-secret
    - secretKey: domain
      remoteRef:
        key: grafana/${ENVIRONMENT}/oauth
        property: domain

---
# ExternalSecret for Alertmanager secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-secrets
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        pagerduty-routing-key: "{{ .pagerdutyKey }}"
        slack-webhook-url: "{{ .slackWebhook }}"
        deadmanssnitch-url: "{{ .deadmanssnitch }}"
  data:
    - secretKey: pagerdutyKey
      remoteRef:
        key: alertmanager/${ENVIRONMENT}/${REGION}/pagerduty
        property: routing-key
    - secretKey: slackWebhook
      remoteRef:
        key: alertmanager/${ENVIRONMENT}/slack
        property: webhook-url
    - secretKey: deadmanssnitch
      remoteRef:
        key: alertmanager/${ENVIRONMENT}/deadmanssnitch
        property: url

---
# ExternalSecret for Grafana admin credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: observability
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin-user: "{{ .adminUser }}"
        admin-password: "{{ .adminPassword }}"
  data:
    - secretKey: adminUser
      remoteRef:
        key: grafana/${ENVIRONMENT}/admin
        property: username
    - secretKey: adminPassword
      remoteRef:
        key: grafana/${ENVIRONMENT}/admin
        property: password
